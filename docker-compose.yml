services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - app_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myapp
    depends_on:
      - ollama
    environment:
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY}
      - FIREWORKS_BASE_URL=${FIREWORKS_BASE_URL:-https://api.fireworks.ai/inference/v1}
      - ALLOWED_MODELS=${ALLOWED_MODELS:-accounts/fireworks/models/llama-v3-8b-instruct}
    volumes:
      - ./input:/input
      - ./output:/output
    networks:
      - app_network
    restart: on-failure

networks:
  app_network:
    driver: bridge

volumes:
  ollama_data:
    driver: local